name: Unit Tests

on: [push, pull_request]

jobs:
  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Catch2
        uses: actions/cache@v4
        with:
          path: boards/v0/test/native/build/_deps
          key: catch2-v3.5.4-${{ runner.os }}

      - name: Install gcovr
        run: pip install gcovr

      - name: Configure
        run: cmake -S boards/v0/test/native -B boards/v0/test/native/build -DCOVERAGE=ON

      - name: Build
        run: cmake --build boards/v0/test/native/build

      - name: Run tests
        run: ./boards/v0/test/native/build/tests

      - name: Generate coverage report
        run: |
          gcovr -r . --filter 'boards/v0/hatsu_v0/logic\.h' --xml coverage.xml --print-summary \
            boards/v0/test/native/build

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v4
        with:
          files: coverage.xml
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
