name: Static Analysis

on: [push, pull_request]

jobs:
  cppcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install cppcheck
        run: sudo apt-get install -y cppcheck

      - name: Run cppcheck
        run: |
          cppcheck \
            --language=c++ \
            --enable=warning,style,performance,portability \
            --error-exitcode=1 \
            --suppress=missingIncludeSystem \
            --suppress=unusedFunction \
            hatsu_ino.ino utils.h

  native-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Cache Catch2
        uses: actions/cache@v4
        with:
          path: test/native/build/_deps
          key: catch2-v3.5.4-${{ runner.os }}

      - name: Configure
        run: cmake -S test/native -B test/native/build

      - name: Build
        run: cmake --build test/native/build

      - name: Run tests
        run: ./test/native/build/tests
